packages:
  - 'packages/*'
  - 'apps/*'
allowBuilds:
  esbuild: true
  unrs-resolver: true
  # lerna dependency; its postinstall only primes the nx daemon/cache,
  # lerna works without it — keep the script blocked
  nx: false
linkWorkspacePackages: true
managePackageManagerVersions: false
minimumReleaseAge: 4320
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200
blockExoticSubdeps: true
overrides:
  cheerio: 1.0.0-rc.5
  css-what: ^5.0.1
  sockjs>uuid: ^14.0.1
